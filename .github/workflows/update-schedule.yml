name: Spielplan aus PDF aktualisieren

on:
  push:
    paths:
      - 'schedule.pdf'
      - 'parse_schedule.py'
      - '.github/workflows/update-schedule.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pypdf
      - run: python parse_schedule.py schedule.pdf matches.json
      - name: Commit aktualisierte matches.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add matches.json
          if git diff --staged --quiet; then
            echo "Keine Änderungen am Spielplan."
          else
            git commit -m "Spielplan automatisch aus PDF aktualisiert"
            git push
          fi
